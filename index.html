<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>San Isidro C - Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    background:
    linear-gradient(
        135deg,
        #001B4D,
        #0D47A1,
        #1976D2,
        #42A5F5
    );
}

/* EFECTOS */

body::before{

    content:"";

    position:absolute;

    width:600px;
    height:600px;

    background:rgba(255,255,255,0.06);

    border-radius:50%;

    top:-200px;
    left:-200px;

    filter:blur(20px);
}

body::after{

    content:"";

    position:absolute;

    width:500px;
    height:500px;

    background:rgba(255,255,255,0.04);

    border-radius:50%;

    bottom:-180px;
    right:-180px;

    filter:blur(20px);
}

/* LOGIN */

.login-box{

    position:relative;

    width:500px;

    padding:50px;

    border-radius:30px;

    background:
    rgba(255,255,255,0.12);

    backdrop-filter:blur(25px);

    border:
    1px solid rgba(255,255,255,0.2);

    box-shadow:
    0 10px 40px rgba(0,0,0,0.35);

    text-align:center;

    z-index:10;

    animation:fadeIn 1s ease;
}

/* LOGO */

.logo{

    width:220px;
    height:220px;

    margin:auto;

    margin-bottom:25px;

    border-radius:50%;

    background:white;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    box-shadow:
    0 10px 25px rgba(0,0,0,0.35);

    border:5px solid rgba(255,255,255,0.5);
}

.logo img{

    width:100%;
    height:100%;

    object-fit:cover;
}

/* TITULO */

.login-box h1{

    color:white;

    font-size:38px;

    font-weight:800;

    letter-spacing:1px;

    margin-bottom:10px;

    text-shadow:
    0 3px 8px rgba(0,0,0,0.3);
}

.subtitulo{

    color:rgba(255,255,255,0.85);

    font-size:15px;

    margin-bottom:35px;

    font-weight:300;
}

/* INPUTS */

.input-group{

    position:relative;

    margin-bottom:22px;
}

.input-group select,
.input-group input{

    width:100%;

    padding:16px;

    border:none;

    border-radius:16px;

    background:
    rgba(255,255,255,0.92);

    font-size:15px;

    outline:none;

    transition:0.3s;

    box-shadow:
    inset 0 2px 5px rgba(0,0,0,0.08);
}

.input-group select:focus,
.input-group input:focus{

    transform:scale(1.02);

    box-shadow:
    0 0 15px rgba(255,255,255,0.5);
}

/* OJO */

.toggle-password{

    position:absolute;

    right:18px;

    top:50%;

    transform:translateY(-50%);

    cursor:pointer;

    font-size:22px;

    display:flex;

    align-items:center;

    justify-content:center;
}

/* BOTON */

#btnLogin{

    width:100%;

    padding:17px;

    border:none;

    border-radius:16px;

    background:
    linear-gradient(
        90deg,
        #0D47A1,
        #1976D2
    );

    color:white;

    font-size:17px;

    font-weight:700;

    letter-spacing:1px;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 8px 20px rgba(0,0,0,0.25);
}

#btnLogin:hover{

    transform:translateY(-3px);

    background:
    linear-gradient(
        90deg,
        #1565C0,
        #42A5F5
    );

    box-shadow:
    0 12px 25px rgba(0,0,0,0.35);
}

/* MENSAJE */

#mensaje{

    margin-top:18px;

    color:#FFE082;

    font-size:14px;

    font-weight:500;
}

/* FOOTER */

.footer{

    margin-top:28px;

    color:rgba(255,255,255,0.75);

    font-size:12px;

    line-height:1.6;
}

/* ANIMACION */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="login-box">

    <!-- LOGO -->

    <div class="logo">

        <img src="logo.png" alt="Logo San Isidro">

    </div>

    <!-- TITULO -->

    <h1>San Isidro C</h1>

    <p class="subtitulo">

        Sistema Académico de Profesores

    </p>

    <!-- SELECT -->

    <div class="input-group">

       <select
    id="profesor"
    onchange="document.getElementById('password').focus()">

    <option>Seleccione un profesor</option>

</select>

    </div>

    <!-- PASSWORD -->

    <div class="input-group">

        <input
            type="password"
            id="password"
            placeholder="Contraseña"
        >

        <span
            id="togglePassword"
            class="toggle-password">

            👁️

        </span>

    </div>

    <!-- BOTON -->

    <button id="btnLogin">

        INGRESAR

    </button>

    <!-- MENSAJE -->

    <p id="mensaje"></p>

    <!-- FOOTER -->

    <div class="footer">

        © 2026 Unidad Educativa San Isidro C<br>

        Desarrollado por el profesor JUAN TUPA

    </div>

</div>

<script type="module" src="app.js"></script>

<script>

const togglePassword =
document.querySelector('#togglePassword');

const password =
document.querySelector('#password');

togglePassword.addEventListener('click', function () {

    const type =
    password.getAttribute('type') === 'password'
    ? 'text'
    : 'password';

    password.setAttribute('type', type);

    this.textContent =
    type === 'password'
    ? '👁️'
    : '🙈';

});

</script>

</body>
</html>
