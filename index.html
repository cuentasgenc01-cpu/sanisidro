<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Profesores</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-box">

    <h1>MARIA AUXILIADORA</h1>

    <select id="profesor" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px;">
        <option>Cargando profesores...</option>
    </select>

    <div style="position: relative; width: 100%; margin-bottom: 20px;">
        <input
            type="password"
            id="password"
            placeholder="Contraseña"
            style="width: 100%; padding: 12px; padding-right: 40px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box;"
        >
        <span id="togglePassword" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 20px;">
            👁️
        </span>
    </div>

    <button id="btnLogin">
        INGRESAR
    </button>

    <p id="mensaje"></p>

</div>

<script type="module" src="app.js"></script>
<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');

    togglePassword.addEventListener('click', function (e) {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.textContent = type === 'password' ? '👁️' : '🙈';
    });
</script>

</body>
</html>
